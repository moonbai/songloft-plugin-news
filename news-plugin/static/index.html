<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻资讯聚合</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>新闻资讯聚合</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="hotboard">热榜</button>
        <button class="tab" data-tab="news">新闻</button>
        <button class="tab" data-tab="player">可播放</button>
        <button class="tab" data-tab="playlist">播放列表</button>
        <button class="tab" data-tab="search">搜索</button>
        <button class="tab" data-tab="sources">脚本管理</button>
      </nav>
    </header>

    <main class="main">
      <!-- 热榜 -->
      <section class="panel active" id="panel-hotboard">
        <div class="toolbar">
          <h2>实时热榜</h2>
          <div class="aggregate-toggle">
            <label><input type="checkbox" id="aggregateMode"> 聚合多源</label>
          </div>
        </div>
        <div id="hotboardList" class="news-list"></div>
      </section>

      <!-- 新闻列表 -->
      <section class="panel" id="panel-news">
        <div class="toolbar">
          <select id="newsSource"></select>
          <select id="newsCategory"></select>
          <button id="loadNewsBtn">加载</button>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

      <!-- 搜索 -->
      <section class="panel" id="panel-search">
        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="输入关键词搜索">
          <select id="searchSource">
            <option value="all">全部</option>
            <option value="weibo">微博热搜</option>
            <option value="baidu">百度搜索</option>
            <option value="zhihu">知乎搜索</option>
            <option value="36kr">36氪</option>
            <option value="toutiao">今日头条</option>
            <option value="pengpai">澎湃新闻</option>
            <option value="wangyi">网易新闻</option>
            <option value="ximalaya">喜马拉雅</option>
            <option value="dedao">得到</option>
          </select>
          <button id="searchBtn">搜索</button>
        </div>
        <div id="searchResults" class="news-list"></div>
      </section>

      <!-- 可播放新闻 -->
      <section class="panel" id="panel-player">
        <div class="toolbar">
          <h2>可播放新闻</h2>
          <div class="play-mode-toolbar">
            <label>播放模式：</label>
            <select id="playerMode">
              <option value="auto">自动（优先音频）</option>
              <option value="audio">仅音频</option>
              <option value="tts">TTS 朗读</option>
            </select>
            <button id="playAllBtn">▶ 全部播放</button>
          </div>
        </div>
        <div id="playableList" class="news-list"></div>
      </section>

      <!-- 播放列表 -->
      <section class="panel" id="panel-playlist">
        <div class="toolbar">
          <h2>我的播放列表</h2>
          <div>
            <span id="playlistCount">0 首</span>
            <button id="clearPlaylistBtn" class="danger-btn">清空</button>
            <button id="playPlaylistBtn">▶ 播放列表</button>
          </div>
        </div>
        <div id="playlistList" class="news-list"></div>
      </section>

      <!-- 脚本管理 -->
      <section class="panel" id="panel-sources">
        <div class="toolbar">
          <h2>自定义解析脚本</h2>
          <button id="reloadSourcesBtn">重新加载</button>
        </div>
        <div class="source-import">
          <h3>导入脚本</h3>
          <textarea id="scriptContent" placeholder="粘贴 JS 脚本内容（需包含 JSDoc 元数据）"></textarea>
          <input type="text" id="scriptName" placeholder="脚本名称">
          <button id="importScriptBtn">导入 JS</button>
          
          <h4>或从 URL 导入</h4>
          <input type="text" id="scriptUrl" placeholder="https://example.com/source.js 或 .zip">
          <button id="importUrlBtn">从 URL 导入</button>
        </div>
        <div id="sourceList" class="source-list"></div>
      </section>
    </main>

    <div class="modal" id="detailModal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="detailTitle"></h2>
        <div class="meta" id="detailMeta"></div>
        <div class="content" id="detailContent"></div>
        <div class="actions">
          <a id="detailLink" target="_blank" class="btn">查看原文</a>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 播放器面板 -->
    <div class="player-panel" id="playerPanel">
      <div class="player-cover">
        <img id="playerCover" src="" alt="">
        <div class="player-icon" id="playerIcon">▶</div>
      </div>
      <div class="player-info">
        <div class="player-title" id="playerTitle">未播放</div>
        <div class="player-subtitle" id="playerSubtitle"></div>
        <div class="player-progress">
          <span class="player-time" id="playerCurrentTime">00:00</span>
          <div class="player-progress-bar" id="playerProgressBar">
            <div class="player-progress-fill" id="playerProgressFill"></div>
          </div>
          <span class="player-time" id="playerDuration">00:00</span>
        </div>
        <div class="player-mode" id="playerModeDisplay">🔊 自动模式</div>
      </div>
      <div class="player-controls">
        <button class="player-btn" id="playerModeBtn" title="播放模式">🔀</button>
        <button class="player-btn" id="playerPrevBtn">⏮</button>
        <button class="player-btn player-btn-main" id="playerPlayBtn">▶</button>
        <button class="player-btn" id="playerNextBtn">⏭</button>
        <button class="player-btn" id="playerVolumeBtn">🔊</button>
        <div class="player-extra">
          <select id="playerRate">
            <option value="0.8">0.8x</option>
            <option value="1.0" selected>1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2.0">2.0x</option>
          </select>
        </div>
        <button class="player-btn player-btn-close" id="playerCloseBtn">✕</button>
      </div>
      <div class="player-volume-popup" id="playerVolumePopup">
        <input type="range" id="playerVolumeRange" min="0" max="100" value="100">
      </div>
    </div>
  </div>

  <script src="static/js/app.js"></script>
</body>
</html>
