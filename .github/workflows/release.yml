name: Release Plugins

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则用日期自动生成)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 第一步:发现所有插件目录
  discover:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.find.outputs.plugins }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 生成版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date +'%Y.%m.%d')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      - name: 发现插件目录
        id: find
        run: |
          PLUGINS=$(find . -maxdepth 2 -name plugin.json -not -path '*/node_modules/*' -not -path '*/dist/*' -not -path '*/.git/*' -not -path '*/artifacts/*' -not -path '*/release-assets/*' -exec dirname {} \; | sed 's|^\./||' | sort | jq -R . | jq -sc .)
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT
          echo "发现的插件: $PLUGINS"

  # 第二步:并行构建所有插件
  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: cd ${{ matrix.plugin }} && npm install

      - name: 更新版本号
        run: |
          cd ${{ matrix.plugin }}
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('plugin.json','utf8'));
            p.version = '${{ needs.discover.outputs.version }}';
            fs.writeFileSync('plugin.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: 构建 (songloft-plugin-builder 自动计算哈希)
        id: build
        run: |
          cd ${{ matrix.plugin }}
          npx @songloft/plugin-builder build 2>&1 | tee build.log
          # 提取哈希
          ENTRY_HASH=$(grep 'entryHash:' build.log | awk '{print $2}')
          ZIP_HASH=$(grep 'zipHash:' build.log | awk '{print $2}')
          PLUGIN_NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('plugin.json','utf8')).entryPath||require('fs').readdirSync('dist').find(f=>f.endsWith('.jsplugin.zip'))?.replace('.jsplugin.zip','')||'plugin')")
          echo "entry_hash=$ENTRY_HASH" >> $GITHUB_OUTPUT
          echo "zip_hash=$ZIP_HASH" >> $GITHUB_OUTPUT
          echo "plugin_name=$PLUGIN_NAME" >> $GITHUB_OUTPUT

      - name: 验证
        run: |
          cd ${{ matrix.plugin }}
          ZIP_FILE=$(ls dist/*.jsplugin.zip | head -1)
          npx @songloft/plugin-builder validate "$ZIP_FILE"

      - name: 暂存产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.build.outputs.plugin_name }}
          path: |
            ${{ matrix.plugin }}/dist/*.jsplugin.zip
            ${{ matrix.plugin }}/plugin.json

  # 第三步:汇总发布 Release
  release:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts

      - name: 收集 zip 和 plugin.json
        id: collect
        run: |
          mkdir -p release-assets
          for dir in artifacts/release-*/; do
            [ -d "$dir" ] || continue
            find "$dir" -name '*.jsplugin.zip' -exec cp {} release-assets/ \;
            PJ=$(find "$dir" -name plugin.json | head -1)
            [ -z "$PJ" ] && continue
            PLUGIN_NAME=$(node -e "const p=JSON.parse(require('fs').readFileSync('$PJ','utf8'));console.log(p.entryPath||p.name||'unknown')")
            cp "$PJ" "release-assets/${PLUGIN_NAME}.plugin.json"
          done
          echo "### Release 资产:"
          ls -la release-assets/

      - name: 回写 plugin.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in release-assets/*.plugin.json; do
            [ -f "$f" ] || continue
            PLUGIN_NAME=$(basename "$f" .plugin.json)
            PLUGIN_DIR=$(find . -maxdepth 2 -name plugin.json -not -path '*/node_modules/*' -not -path '*/dist/*' -not -path '*/.git/*' -exec dirname {} \; | grep -E "/${PLUGIN_NAME}(-plugin)?$" | head -1)
            if [ -n "$PLUGIN_DIR" ]; then
              cp "$f" "$PLUGIN_DIR/plugin.json"
              git add "$PLUGIN_DIR/plugin.json"
            fi
          done
          git diff --staged --quiet || git commit -m "chore: update plugin.json for v${{ needs.discover.outputs.version }}"
          git push

      - name: 生成 Release 说明
        id: notes
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## Songloft Plugins v${{ needs.discover.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 安装方式" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "在 Songloft 中通过 URL 安装，或下载对应的 \`*.jsplugin.zip\` 手动导入。" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 插件列表" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "| 插件 | entryHash | zipHash | 下载 |" >> $GITHUB_OUTPUT
          echo "|------|-----------|---------|------|" >> $GITHUB_OUTPUT
          for f in release-assets/*.plugin.json; do
            [ -f "$f" ] || continue
            PLUGIN_NAME=$(basename "$f" .plugin.json)
            ENTRY_HASH=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).entryHash||'')")
            ZIP_HASH=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).zipHash||'')")
            ZIP_FILE=$(ls release-assets/${PLUGIN_NAME}*.jsplugin.zip 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
            [ -z "$ZIP_FILE" ] && ZIP_FILE=$(ls release-assets/*.jsplugin.zip 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
            echo "| $PLUGIN_NAME | \`$ENTRY_HASH\` | \`$ZIP_HASH\` | [$ZIP_FILE](https://github.com/moonbai/songloft-plugins/releases/download/v${{ needs.discover.outputs.version }}/$ZIP_FILE) |" >> $GITHUB_OUTPUT
          done
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.discover.outputs.version }}
          name: Songloft Plugins v${{ needs.discover.outputs.version }}
          files: release-assets/*.jsplugin.zip
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
